<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller 3</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>

<body>
    <section>
        <div id="contenedor">
            <label for="pokemons" id="elegir">Elige tu Pokemón</label>
            <select id="pokemons" onchange="pokemonSelected(this.value)">
                <option value="">Select a Pokemon</option>
            </select>
        </div>

        <div id="pokemon-info">
            <h1 id="pokemon-name"></h1>
            <img id="pokemon-image">
            <ul id="pokemon-stats"></ul>
            <h2 id="title-abilities"></h2>
            <ul id="pokemon-abs"></ul>
        </div>
    </section>
</body>

</html>
